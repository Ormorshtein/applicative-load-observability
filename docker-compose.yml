services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "9201:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    cpus: 2
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    image: oracle1012/applicative-load-observability:logstash-1.13.0
    ports:
      - "8080:8080"
      # - "9600:9600"  # Uncomment to expose Logstash monitoring API
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ANALYZER_URL=${ANALYZER_URL:-http://analyzer:8000/analyze}
      - LOGSTASH_HTTP_PORT=${LOGSTASH_HTTP_PORT:-8080}
      - CLUSTER_NAME=${CLUSTER_NAME:-default}
      # Set LOGSTASH_MONITORING=true to ship pipeline metrics to ES
      # (viewable in Kibana → Stack Monitoring)
      - LOGSTASH_MONITORING=${LOGSTASH_MONITORING:-false}
    volumes:
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/
      - ./logstash/logstash.yml:/usr/share/logstash/logstash.yml:ro
      - ./logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      analyzer:
        condition: service_healthy

  analyzer:
    build: ./analyzer
    image: oracle1012/applicative-load-observability:analyzer-1.13.0
    environment:
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      # Dynamic baselines — P50 from recent search traffic (requires ELASTICSEARCH_URL):
      #   - BASELINE_CACHE_TTL=60
      #   - BASELINE_QUERY_WINDOW=1h
      # Static overrides (bypass dynamic computation for these keys):
      #   - STRESS_BASELINE_TOOK_MS=100
      #   - STRESS_BASELINE_HITS=1000
      #   - STRESS_BASELINE_SHARDS_TOTAL=5
      #   - STRESS_BASELINE_SIZE=100
      #   - STRESS_BASELINE_DOCS_AFFECTED=500
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    ports:
      - "5601:5601"
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  gateway:
    image: oracle1012/applicative-load-observability:gateway-1.13.0
    volumes:
      - ./gateway/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    ports:
      - "${GATEWAY_PORT:-9200}:${GATEWAY_PORT:-9200}"
    environment:
      - DNS_RESOLVER=${DNS_RESOLVER:-127.0.0.11}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-elasticsearch:9200}
      - LOGSTASH_URL=${LOGSTASH_URL:-http://logstash:8080/}
      - GATEWAY_PORT=${GATEWAY_PORT:-9200}
      - WORKER_CONNECTIONS=${WORKER_CONNECTIONS:-1024}
      - LOGSTASH_TIMEOUT_MS=${LOGSTASH_TIMEOUT_MS:-1000}
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ── Prometheus monitoring stack (activate with: docker compose --profile prometheus up) ──

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["prometheus"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - obs-net

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    profiles: ["prometheus"]
    command: ["--nginx.scrape-uri=http://gateway:9145/stub_status"]
    networks:
      - obs-net
    depends_on:
      - gateway

  elasticsearch-exporter:
    image: quay.io/prometheuscommunity/elasticsearch-exporter:v1.10.0
    profiles: ["prometheus"]
    command: ["--es.uri=http://elasticsearch:9200"]
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  logstash-exporter:
    image: kuskoman/logstash-exporter:v1.9.1
    profiles: ["prometheus"]
    environment:
      - LOGSTASH_URL=http://logstash:9600
    networks:
      - obs-net
    depends_on:
      - logstash

volumes:
  es-data:
  grafana-data:
  prometheus-data:

networks:
  obs-net:
    driver: bridge
