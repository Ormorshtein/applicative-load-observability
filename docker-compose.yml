services:

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-alo}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch-data:/var/lib/clickhouse
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ch-setup:
    image: oracle1012/applicative-load-observability:ch-setup-2.0.3
    environment:
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-alo}
      - CLICKHOUSE_CA_CERT=${CLICKHOUSE_CA_CERT:-}
      - CLICKHOUSE_INSECURE=${CLICKHOUSE_INSECURE:-false}
      - CLICKHOUSE_CLUSTER=${CLICKHOUSE_CLUSTER:-}
    networks:
      - obs-net
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: on-failure

  logstash:
    build:
      context: .
      dockerfile: logstash/Dockerfile
    image: oracle1012/applicative-load-observability:logstash-2.0.3
    ports:
      - "8080:8080"
      # - "9600:9600"  # Uncomment to expose Logstash monitoring API
    environment:
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-alo}
      - ANALYZER_URL=${ANALYZER_URL:-http://analyzer:8000/analyze}
      - LOGSTASH_HTTP_PORT=${LOGSTASH_HTTP_PORT:-8080}
      - CLUSTER_NAME=${CLUSTER_NAME:-default}
      - LS_JAVA_OPTS=${LS_JAVA_OPTS:--Xms512m -Xmx512m}
      - LS_CH_FLUSH_SIZE=${LS_CH_FLUSH_SIZE:-5000}
      - LS_CH_DEAD_LETTER_FLUSH_SIZE=${LS_CH_DEAD_LETTER_FLUSH_SIZE:-1000}
      - LS_CH_IDLE_FLUSH_TIME=${LS_CH_IDLE_FLUSH_TIME:-5}
      - LS_CH_AUTOMATIC_RETRIES=${LS_CH_AUTOMATIC_RETRIES:-3}
      - LS_CH_POOL_MAX=${LS_CH_POOL_MAX:-10}
      - LS_CH_SETTINGS=${LS_CH_SETTINGS:-input_format_skip_unknown_fields=1,async_insert=1,wait_for_async_insert=0}
    volumes:
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/
      - ./logstash/logstash.yml:/usr/share/logstash/logstash.yml:ro
      - ./logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    depends_on:
      clickhouse:
        condition: service_healthy
      analyzer:
        condition: service_healthy

  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    image: oracle1012/applicative-load-observability:analyzer-2.0.3
    environment:
      - CLICKHOUSE_URL=${CLICKHOUSE_URL:-http://clickhouse:8123}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-alo}
      - CLICKHOUSE_CA_CERT=${CLICKHOUSE_CA_CERT:-}
      - CLICKHOUSE_INSECURE=${CLICKHOUSE_INSECURE:-false}
      # Dynamic baselines — P50 from recent ClickHouse traffic:
      #   - BASELINE_CACHE_TTL=60
      #   - BASELINE_QUERY_WINDOW=1 HOUR
      # Static overrides (bypass dynamic computation for these keys):
      #   - STRESS_BASELINE_TOOK_MS=100
      #   - STRESS_BASELINE_HITS=500
      #   - STRESS_BASELINE_SHARDS_TOTAL=5
      #   - STRESS_BASELINE_DOCS_AFFECTED=500
      # Max bytes kept on stored request.body (0 = no truncation).
      # Default 32000 sits under the 32 766-byte ES keyword cap; override
      # only if the request.body mapping has been raised above keyword.
      #   - ALO_REQUEST_BODY_STORE_MAX_BYTES=32000
    networks:
      - obs-net
    depends_on:
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - obs-net
    depends_on:
      clickhouse:
        condition: service_healthy

  gateway:
    build:
      context: gateway
      dockerfile: Dockerfile
    image: oracle1012/applicative-load-observability:gateway-2.0.3
    volumes:
      - ./gateway/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    ports:
      - "${GATEWAY_PORT:-9200}:${GATEWAY_PORT:-9200}"
    environment:
      - DNS_RESOLVER=${DNS_RESOLVER:-127.0.0.11}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-elasticsearch:9200}
      - LOGSTASH_URL=${LOGSTASH_URL:-http://logstash:8080/}
      - GATEWAY_PORT=${GATEWAY_PORT:-9200}
      - WORKER_CONNECTIONS=${WORKER_CONNECTIONS:-1024}
      - LOGSTASH_TIMEOUT_MS=${LOGSTASH_TIMEOUT_MS:-1000}
      - CLUSTER_NAME=${CLUSTER_NAME:-default}
      - CLIENT_BODY_BUFFER_SIZE=${CLIENT_BODY_BUFFER_SIZE:-64m}
    networks:
      - obs-net
    depends_on:
      logstash:
        condition: service_healthy

  # ── Prometheus monitoring stack (activate with: docker compose --profile prometheus up) ──
  # To wire the Prometheus datasource into Grafana, generate the provisioning file first:
  #   PROMETHEUS_URL=http://prometheus:9090 python grafana/setup.py
  # (Mirrors the Helm chart's opt-in `grafana.prometheusUrl`. Empty/unset = no datasource.)

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles: ["prometheus"]
    ports:
      - "9090:9090"
    # CLUSTER_NAME stamps the `cluster` external label (expanded by
    # --enable-feature=expand-external-labels) so the Grafana Stack Health
    # dashboard can scope per cluster. Keep it equal to the logstash
    # CLUSTER_NAME so Prometheus and ClickHouse panels agree.
    environment:
      CLUSTER_NAME: ${CLUSTER_NAME:-default}
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
      - --enable-feature=expand-external-labels
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - obs-net

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.0
    profiles: ["prometheus"]
    command: ["--nginx.scrape-uri=http://gateway:9145/stub_status"]
    networks:
      - obs-net
    depends_on:
      - gateway

  # ClickHouse exposes a built-in /metrics endpoint on port 9363 (configurable).
  # Add a scrape_config in prometheus.yml pointing to clickhouse:9363 when enabled.

  logstash-exporter:
    image: kuskoman/logstash-exporter:v1.9.1
    profiles: ["prometheus"]
    environment:
      - LOGSTASH_URL=http://logstash:9600
    networks:
      - obs-net
    depends_on:
      - logstash

volumes:
  ch-data:
  grafana-data:
  prometheus-data:

networks:
  obs-net:
    driver: bridge
