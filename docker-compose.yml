services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    ports:
      - "9201:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.monitoring.collection.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    cpus: 2
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - obs-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  logstash:
    build: ./logstash
    ports:
      - "8080:8080"
      # - "9600:9600"  # Uncomment to expose Logstash monitoring API
    environment:
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ANALYZER_URL=${ANALYZER_URL:-http://analyzer:8000/analyze}
      - LOGSTASH_HTTP_PORT=${LOGSTASH_HTTP_PORT:-8080}
      # Set LOGSTASH_MONITORING=true to ship pipeline metrics to ES
      # (viewable in Kibana → Stack Monitoring)
      - LOGSTASH_MONITORING=${LOGSTASH_MONITORING:-false}
    volumes:
      - ./logstash/pipeline/:/usr/share/logstash/pipeline/
      - ./logstash/logstash.yml:/usr/share/logstash/logstash.yml:ro
      - ./logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy
      analyzer:
        condition: service_healthy

  analyzer:
    build: ./analyzer
    # Uncomment to override stress baselines per cluster:
    # environment:
    #   - STRESS_BASELINE_TOOK_MS=100
    #   - STRESS_BASELINE_HITS=10000
    #   - STRESS_BASELINE_SHARDS_TOTAL=5
    #   - STRESS_BASELINE_SIZE=100
    #   - STRESS_BASELINE_DOCS_AFFECTED=500
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      - ELASTICSEARCH_HOSTS=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    ports:
      - "5601:5601"
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-9200}:${GATEWAY_PORT:-9200}"
    environment:
      - DNS_RESOLVER=${DNS_RESOLVER:-127.0.0.11}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST:-elasticsearch:9200}
      - LOGSTASH_URL=${LOGSTASH_URL:-http://logstash:8080/}
      - GATEWAY_PORT=${GATEWAY_PORT:-9200}
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy

  metricbeat:
    image: docker.elastic.co/beats/metricbeat:8.13.0
    # Set METRICBEAT_ENABLED=0 to disable stack monitoring
    scale: ${METRICBEAT_ENABLED:-1}
    user: root
    command: ["--strict.perms=false"]
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - KIBANA_HOST=http://kibana:5601
    volumes:
      - ./metricbeat/metricbeat.yml:/usr/share/metricbeat/metricbeat.yml:ro
    networks:
      - obs-net
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es-data:

networks:
  obs-net:
    driver: bridge
