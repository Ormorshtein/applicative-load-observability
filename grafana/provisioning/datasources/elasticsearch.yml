apiVersion: 1

# Primary datasource queries raw + summary. While raw data exists it
# outnumbers summary docs ~50:1 (<2% noise). After ILM deletes raw,
# summary seamlessly provides avg metrics and percentiles at hourly
# granularity.
datasources:
  - name: Elasticsearch (ALO)
    type: elasticsearch
    uid: alo-elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "logs-alo.*-*,alo-summary"
    isDefault: true
    jsonData:
      esVersion: "8.0.0"
      timeField: "@timestamp"
      logMessageField: ""
      logLevelField: ""
      maxConcurrentShardRequests: 5
      interval: ""
    editable: true

  - name: Elasticsearch (ALO Summary)
    type: elasticsearch
    uid: alo-elasticsearch-summary
    access: proxy
    url: http://elasticsearch:9200
    database: "alo-summary"
    isDefault: false
    jsonData:
      esVersion: "8.0.0"
      timeField: "@timestamp"
      logMessageField: ""
      logLevelField: ""
      maxConcurrentShardRequests: 5
      interval: ""
    editable: true
