apiVersion: 1

# The primary datasource queries both raw indices and the summary index.
# While raw data exists, it outnumbers summary docs ~50:1 so the summary
# adds <2% noise to aggregations.  After ILM deletes raw indices, the
# summary docs seamlessly provide avg metrics and percentiles at hourly
# granularity — giving indefinite retention without panel changes.
datasources:
  - name: Elasticsearch (ALO)
    type: elasticsearch
    uid: alo-elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "logs-alo.*-*,alo-summary"
    isDefault: true
    jsonData:
      esVersion: "8.0.0"
      timeField: "@timestamp"
      logMessageField: ""
      logLevelField: ""
      maxConcurrentShardRequests: 5
      interval: ""
    editable: true

  - name: Elasticsearch (ALO Summary)
    type: elasticsearch
    uid: alo-elasticsearch-summary
    access: proxy
    url: http://elasticsearch:9200
    database: "alo-summary"
    isDefault: false
    jsonData:
      esVersion: "8.0.0"
      timeField: "@timestamp"
      logMessageField: ""
      logLevelField: ""
      maxConcurrentShardRequests: 5
      interval: ""
    editable: true
