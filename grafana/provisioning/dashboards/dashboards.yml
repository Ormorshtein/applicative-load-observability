apiVersion: 1

providers:
  - name: ALO Dashboards
    orgId: 1
    folder: Applicative Load Observability
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
