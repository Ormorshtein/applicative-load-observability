input {
  http {
    port => "${LOGSTASH_HTTP_PORT:8080}"
    codec => "json"
  }
}

filter {
  # Build clean JSON payload for the analyzer
  ruby {
    code => '
      require "json"
      payload = {}
      ["method", "path", "headers", "request_body", "response_body",
       "client_host", "upstream_response_time", "content_length",
       "response_size_bytes", "response_status", "cluster_name"].each do |f|
        v = event.get(f)
        payload[f] = v unless v.nil?
      end
      event.set("[@metadata][analyzer_body]", payload.to_json)
    '
  }

  # Forward to analyzer
  http {
    url => "${ANALYZER_URL:http://analyzer:8000/analyze}"
    verb => "POST"
    body => "%{[@metadata][analyzer_body]}"
    target_body => "[analyzer_response]"
    keepalive => true
  }

  # Replace event with analyzer response and extract operation for routing
  if [analyzer_response] {
    ruby {
      code => '
        resp = event.get("[analyzer_response]")

        if resp.is_a?(Hash) && resp.key?("_msearch_records")
          records = resp["_msearch_records"]
          event.to_hash.keys.each { |k| event.remove(k) }
          event.set("[_msearch_records]", records)
          event.set("[@metadata][is_msearch]", "true")

        elsif resp.is_a?(Hash)
          op = (resp.dig("request", "operation") || "unknown").sub(/^_/, "")
          ts_str = resp.delete("@timestamp")

          event.to_hash.keys.each { |k| event.remove(k) }
          resp.each { |k, v| event.set(k, v) }

          event.set("@timestamp", LogStash::Timestamp.new(ts_str)) if ts_str
          if op == "unknown"
            event.tag("_httprequestfailure")
          else
            event.set("[@metadata][ds_dataset]", op)
          end
        end
      '
    }
  }

  # _msearch fan-out: split array into individual events
  if [@metadata][is_msearch] {
    split {
      field => "[_msearch_records]"
    }
    ruby {
      code => '
        record = event.get("[_msearch_records]")
        if record.is_a?(Hash)
          ts_str = record.delete("@timestamp")
          event.remove("[_msearch_records]")
          record.each { |k, v| event.set(k, v) }
          event.set("@timestamp", LogStash::Timestamp.new(ts_str)) if ts_str
          op = (record.dig("request", "operation") || "unknown").sub(/^_/, "")
          event.set("[@metadata][ds_dataset]", op)
          event.remove("@version")
        end
      '
    }
  }

}

output {
  if "_httprequestfailure" in [tags] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
      index => "logs-alo.dead_letter-%{cluster_name}"
      action => "create"
    }
  } else if [@metadata][ds_dataset] {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_URL:http://elasticsearch:9200}"]
      index => "logs-alo.%{[@metadata][ds_dataset]}-%{cluster_name}"
      action => "create"
    }
  }
}
