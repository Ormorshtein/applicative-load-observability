http.host: "0.0.0.0"
pipeline.batch.size: 125
pipeline.batch.delay: 50

# Memory buffer — events queue in memory so HTTP input doesn't drop under backpressure
queue.type: memory
queue.max_bytes: 256mb

log.level: info

# Pipeline monitoring — ships metrics (events in/out/filtered, errors) to ES.
# Enable by setting LOGSTASH_MONITORING=true in docker-compose environment.
# Viewable in Kibana → Stack Monitoring.
xpack.monitoring.enabled: ${LOGSTASH_MONITORING}
xpack.monitoring.elasticsearch.hosts: ["http://elasticsearch:9200"]
