# ── Pipeline mode ───────────────────────────────────────────────────────────
# Controls which pipeline processor is deployed: "logstash" or "nifi".
# When "logstash": deploys Logstash, skips NiFi.
# When "nifi":     deploys NiFi, skips Logstash.
pipelineMode: logstash

# ── Dashboard UI ──────────────────────────────────────────────────────────
# Which dashboard UI to deploy: "kibana", "grafana", or "none".
#   kibana  → deploys Kibana + ALO dashboard setup job (default)
#   grafana → deploys Grafana + ALO dashboard setup job
#   none    → no dashboard UI deployed
# For external instances, set this to the matching value and configure
# the external section under kibana or grafana below.
dashboardUI: kibana

# ── Global ──────────────────────────────────────────────────────────────────
global:
  # Name of the monitored Elasticsearch cluster (used as data stream namespace)
  clusterName: default
  # Observability data stream pattern written by the pipeline
  observabilityIndex: alo

# ── Elasticsearch (ALO storage) ────────────────────────────────────────────
# The ES cluster where ALO observability data is stored.
# Used by: logstash (writes), kibana (reads), setup job.
# For the ES cluster the gateway proxies to, see gateway.elasticsearch below.
elasticsearch:
  # Set external.enabled=true to use an existing Elasticsearch cluster.
  # When external, no ES pods are deployed by this chart.
  external:
    enabled: false
    # Full URL including scheme and port, e.g. https://es.prod.internal:9200
    url: ""
    # Basic auth or API key for the external cluster.
    # These are used by the gateway (proxy headers) and Kibana.
    auth:
      enabled: false
      # "basic" or "apiKey"
      type: basic
      username: ""
      password: ""
      # Elasticsearch API key (used when type=apiKey)
      apiKey: ""
      # Reference a pre-existing Secret instead of inlining credentials.
      # The secret must contain keys matching the auth type:
      #   basic  → keys: "username", "password"
      #   apiKey → key:  "apiKey"
      existingSecret: ""
    # TLS settings for the external cluster.
    tls:
      # CA certificate PEM content (used when create=true).
      caCert: ""
      # Name of the Secret containing key "ca.crt".
      # When create=true, this is the name of the chart-managed secret.
      # When create=false, this references a pre-existing secret.
      caCertSecret: ""
      # true  → chart creates a Secret from caCert.
      # false → use a pre-existing Secret named by caCertSecret.
      create: false
      # Skip TLS verification (not recommended in production).
      insecureSkipVerify: false

  # ── Internal deployment (ignored when external.enabled=true) ──
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: "8.13.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  initResources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  javaOpts: "-Xms512m -Xmx512m"
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  security:
    enabled: false
    # Credentials for the internal ES cluster (xpack.security).
    # Ignored when security.enabled=false.
    username: elastic
    password: changeme
    existingSecret: ""
  service:
    port: 9200
  # Prometheus exporter sidecar (elasticsearch-exporter).
  # Disabled by default — enable to monitor the ES cluster via Prometheus.
  exporter:
    enabled: false
    image:
      repository: quay.io/prometheuscommunity/elasticsearch-exporter
      tag: "v1.10.0"
      pullPolicy: IfNotPresent
    port: 9114
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── NiFi ────────────────────────────────────────────────────────────────────
nifi:
  # Set external.enabled=true to point at an existing NiFi instance.
  # The gateway will send observations to external.listenUrl.
  external:
    enabled: false
    # Full URL to the ListenHTTP endpoint, e.g. https://nifi.prod:8080/observe
    listenUrl: ""
    # Auth header sent with every observation POST.
    auth:
      enabled: false
      # Header name and value, e.g. "Authorization" / "Bearer <token>"
      headerName: Authorization
      headerValue: ""
      # Reference a pre-existing Secret instead of inlining the token.
      # The secret must contain key "authHeaderValue".
      existingSecret: ""
    # TLS settings for the external NiFi endpoint.
    tls:
      caSecret: ""
      insecureSkipVerify: false

  # ── Internal deployment (ignored when external.enabled=true) ──
  image:
    repository: apache/nifi
    tag: "2.2.0"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  # Credentials for the NiFi UI (single-user mode).
  auth:
    username: admin
    password: adminadminadmin
    # Reference a pre-existing Secret with keys "username" and "password".
    existingSecret: ""
  sensitivePropsKey: observabilitykey
  service:
    httpsPort: 8443
    listenPort: 8080
  # Base path for the ListenHTTP processor
  listenBasePath: observe
  # Seed flow — mounted from ConfigMap
  flow:
    # Set to false to let NiFi start with an empty canvas
    seedEnabled: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── Logstash ────────────────────────────────────────────────────────────────
logstash:
  # Set external.enabled=true to use an existing Logstash instance.
  # The gateway will send observations to external.url.
  external:
    enabled: false
    url: ""

  # ── Internal deployment (ignored when external.enabled=true) ──
  image:
    repository: oracle1012/applicative-load-observability
    tag: logstash-1.13.0
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  service:
    httpPort: 8080
    monitoringPort: 9600
  pipeline:
    batchSize: 125
    batchDelay: 50
  queue:
    type: memory
    maxBytes: 256mb
  # Prometheus exporter sidecar (kuskoman/logstash-exporter).
  # Enable to add a Prometheus exporter sidecar to this component.
  exporter:
    enabled: false
    image:
      repository: kuskoman/logstash-exporter
      tag: "v1.9.1"
      pullPolicy: IfNotPresent
    port: 9198
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── Analyzer ────────────────────────────────────────────────────────────────
analyzer:
  image:
    repository: oracle1012/applicative-load-observability
    tag: analyzer-1.13.0
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8000
  # Dynamic baselines — P50 from recent search traffic, refreshed every cacheTTL.
  # ES connection is injected automatically from the elasticsearch config above.
  dynamicBaselines:
    cacheTTL: "60"
    queryWindow: "1h"
  # Static baseline overrides — bypass dynamic computation for these keys.
  # Empty string means use the code default (or dynamic value when available).
  stressBaselines:
    tookMs: ""
    hits: ""
    shardsTotal: ""
    size: ""
    docsAffected: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []

# ── Gateway ─────────────────────────────────────────────────────────────────
gateway:
  # The ES cluster the gateway proxies to (the one being monitored).
  # If url is empty, falls back to the main elasticsearch config above.
  elasticsearch:
    url: ""
    auth:
      # When true, the gateway injects its own Authorization header, overriding
      # any credentials the client sends. When false (default), client auth
      # headers pass through to ES untouched (transparent proxy).
      injectAuth: false
      type: basic           # "basic" or "apiKey"
      username: ""
      password: ""
      apiKey: ""
      existingSecret: ""    # Secret with keys matching the auth type
    tls:
      caCert: ""
      caCertSecret: ""
      create: false
      insecureSkipVerify: false
  # DNS resolver for OpenResty. Leave empty to auto-detect from /etc/resolv.conf (works on K8s and OpenShift).
  dnsResolver: ""
  image:
    repository: oracle1012/applicative-load-observability
    tag: gateway-1.13.0
    pullPolicy: IfNotPresent
  replicas: 2
  port: 9200
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  initResources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  # Nginx error log level (debug, info, notice, warn, error, crit)
  errorLogLevel: warn
  # Workers and connections per OpenResty instance
  workerProcesses: 2
  workerConnections: 4096
  # Timeout for ES proxy
  proxyReadTimeout: 60s
  # Timeout for pipeline notification (ms)
  pipelineTimeout: 1000
  service:
    type: ClusterIP
    port: 9200
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Prometheus exporter sidecar (nginx-prometheus-exporter).
  # Enable to add a Prometheus exporter sidecar to this component.
  exporter:
    enabled: false
    image:
      repository: nginx/nginx-prometheus-exporter
      tag: "1.4.0"
      pullPolicy: IfNotPresent
    port: 9113
    # Internal port for stub_status (not exposed on the Service)
    stubStatusPort: 9145
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  podAnnotations: {}
  extraEnv: []

# ── Kibana ──────────────────────────────────────────────────────────────────
kibana:
  enabled: true
  # Set external.enabled=true to skip deploying Kibana
  external:
    enabled: false
    url: ""

  image:
    repository: docker.elastic.co/kibana/kibana
    tag: "8.13.0"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  service:
    type: ClusterIP
    port: 5601
  # Import the pre-built dashboard on startup (deprecated, use setup below)
  dashboardSetup:
    enabled: true
  # Kibana setup job — runs setup.py to create index templates and import dashboards.
  # Uses a custom image containing setup.py + ndjson files (too large for ConfigMap).
  setup:
    enabled: true
    image:
      repository: oracle1012/applicative-load-observability
      tag: kibana-setup-1.13.0
      pullPolicy: IfNotPresent
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []

# ── Grafana ────────────────────────────────────────────────────────────────
grafana:
  enabled: false
  # Set external.enabled=true to push dashboards to an existing Grafana via API
  # (no Grafana pod deployed, only setup job runs).
  external:
    enabled: false
    url: ""
    auth:
      username: admin
      password: admin
      existingSecret: ""

  image:
    repository: grafana/grafana
    tag: "11.0.0"
    pullPolicy: IfNotPresent
  replicas: 1
  adminPassword: admin
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  # Setup job — pushes datasource + dashboards via Grafana API.
  # Runs automatically for external Grafana; also runs for internal Grafana
  # as a post-install hook to ensure dashboards are imported via API too.
  setup:
    enabled: true
    image:
      repository: oracle1012/applicative-load-observability
      tag: grafana-setup-1.13.0
      pullPolicy: IfNotPresent
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ── Ingress (Kubernetes) ────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
  gateway:
    host: ""
    path: /
  kibana:
    host: ""
    path: /
  elasticsearch:
    host: ""
    path: /
  analyzer:
    host: ""
    path: /
  logstash:
    host: ""
    path: /
  nifi:
    host: ""
    path: /
  tls: []

# ── Route (OpenShift) ──────────────────────────────────────────────────────
route:
  enabled: false
  annotations: {}
  # TLS termination: edge, passthrough, or reencrypt
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  # Per-service routes.  host is optional — OpenShift assigns one when empty.
  gateway:
    enabled: true
    host: ""
  kibana:
    enabled: true
    host: ""
  elasticsearch:
    enabled: false
    host: ""
  analyzer:
    enabled: false
    host: ""
  logstash:
    enabled: false
    host: ""
  nifi:
    enabled: false
    host: ""

# ── Service accounts ───────────────────────────────────────────────────────
serviceAccount:
  # Create a dedicated ServiceAccount for ALO pods
  create: false
  name: ""
  annotations: {}

# ── Pod security defaults (applied to all components) ──────────────────────
podSecurityContext: {}

securityContext: {}

# ── Helm test pods ────────────────────────────────────────────────────────
testImage:
  repository: busybox
  tag: "1.36"

# ── Prometheus ServiceMonitors ────────────────────────────────────────────
# Deploy ServiceMonitor CRDs for Prometheus Operator autodiscovery.
# Requires at least one exporter to be enabled.
serviceMonitors:
  enabled: false
  # Extra labels for ServiceMonitor resources (e.g. { release: prometheus })
  labels: {}
  # Scrape interval
  interval: "15s"

# ── Image pull secrets (shared across all deployments) ──────────────────────
imagePullSecrets: []
