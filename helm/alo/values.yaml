# ΓöÇΓöÇ Global ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
global:
  # Name of the monitored Elasticsearch cluster (used as the cluster_name
  # column in ClickHouse, the source of multi-tenant separation).
  clusterName: default
  # Logical name of the observability dataset (cosmetic; no longer used for
  # ES data stream routing).
  observabilityIndex: alo

# ΓöÇΓöÇ Table settings (ClickHouse retention / partitioning) ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
# Passed to the ch-setup job. The DDL builder uses these to issue TTL clauses.
tableSettings:
  rawRetentionDays: 3
  summaryRetentionDays: 120
  rawPartitionBy: "toYYYYMMDD(timestamp)"
  summaryPartitionBy: "toYYYYMM(time_bucket)"
  # Full TTL clause overrides — empty means use rawRetentionDays/summaryRetentionDays.
  # Accept any expression CH parses, including storage-tier moves.
  # Example:
  #   rawTtlClause: "timestamp + INTERVAL 1 DAY TO VOLUME 'warm', timestamp + INTERVAL 7 DAY DELETE"
  rawTtlClause: ""
  summaryTtlClause: ""
  # Extra SETTINGS merged into each MergeTree-family table. Use for
  # storage_policy, merge_with_ttl_timeout, index_granularity, etc.
  # Example:
  #   rawExtraSettings:
  #     storage_policy: hot_warm_cold
  #     merge_with_ttl_timeout: "86400"
  rawExtraSettings: {}
  summaryExtraSettings: {}
  # Sharding key used for the Distributed engine when cluster mode is on.
  shardingKey: "cityHash64(cluster_name, request_operation)"

# ΓöÇΓöÇ ClickHouse (analytics sink) ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
# Where Logstash writes, Grafana reads, and the analyzer fetches baselines.
# This is NOT the customer's ES that the gateway proxies ΓÇö see gateway.elasticsearch.
clickhouse:
  enabled: true
  database: alo
  # Set external.enabled=true to use a CH instance you provide. When external,
  # no ClickHouse pods are deployed by this chart.
  external:
    enabled: false
    # HTTP URL including scheme and port (e.g. https://ch.prod:8443).
    url: ""
    # Host used by the Grafana datasource native-protocol connection.
    # Defaults to url's host when empty.
    host: ""
    auth:
      enabled: false
      username: ""
      password: ""
      # Pre-existing Secret with keys "username" and "password".
      existingSecret: ""
    tls:
      caCert: ""
      caCertSecret: ""
      create: false
      insecureSkipVerify: false

  # ΓöÇΓöÇ Internal deployment (ignored when external.enabled=true) ΓöÇΓöÇ
  image:
    repository: clickhouse/clickhouse-server
    tag: "24.8"
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  service:
    httpPort: 8123
    nativePort: 9000
  # Internal auth (when running the embedded StatefulSet).
  auth:
    enabled: false
    username: "default"
    password: ""
  # ClickHouse exposes a built-in Prometheus endpoint on configurable port.
  # No separate exporter container is needed.
  exporter:
    enabled: false
    port: 9363

  # Distributed-table mode. When true, every table becomes a Replicated*MergeTree
  # local + Distributed front pair; clients write/read via the unsuffixed name.
  cluster:
    enabled: false
    name: alo_cluster
    shards: 1
    replicas: 1
    shardingKey: "cityHash64(cluster_name, request_operation)"
    keeper:
      # External keeper/zookeeper hosts, comma-separated (e.g. "zk1:2181,zk2:2181").
      # Empty when running single-node. The chart does NOT yet deploy embedded
      # ClickHouse Keeper ΓÇö supply your own when cluster.enabled=true.
      external: ""

  # ch-setup job ΓÇö runs the schema DDL after install/upgrade.
  setup:
    enabled: true
    image:
      repository: oracle1012/applicative-load-observability
      tag: ch-setup-2.1.6
      pullPolicy: IfNotPresent
    database: true
    rawTable: true
    deadLetterTable: true
    summaryTable: true
    materializedView: true

  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ΓöÇΓöÇ Logstash ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
logstash:
  external:
    enabled: false
    url: ""

  image:
    repository: oracle1012/applicative-load-observability
    tag: logstash-2.1.6
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: "2"
      memory: 2Gi
  service:
    httpPort: 8080
    monitoringPort: 9600
  pipeline:
    workers: 4
    batchSize: 125
    batchDelay: 50
  queue:
    type: memory
    maxBytes: 256mb

  # LS_JAVA_OPTS env passed to the logstash container. Empty = use logstash defaults.
  # Example: "-Xms1g -Xmx1g"
  javaOpts: ""
  # Extra env entries appended to the logstash container.
  # Example:
  #   extraEnv:
  #     - name: PIPELINE_ECS_COMPATIBILITY
  #       value: disabled
  extraEnv: []

  # Tunables for logstash-output-clickhouse. Two outputs share most knobs
  # but use different flush sizes (raw is high-throughput; dead-letter is rare).
  clickhouseOutput:
    flushSize: 5000
    deadLetterFlushSize: 1000
    idleFlushTime: 5
    automaticRetries: 3
    poolMax: 10
    # Settings passed via the X-ClickHouse-Settings HTTP header on every
    # insert request. ``async_insert=1`` batches small inserts into larger
    # blocks server-side; ``input_format_skip_unknown_fields=1`` tolerates
    # transient schema drift.
    chSettings: "input_format_skip_unknown_fields=1,async_insert=1,wait_for_async_insert=0"

  exporter:
    enabled: false
    image:
      repository: kuskoman/logstash-exporter
      tag: "v1.9.1"
      pullPolicy: IfNotPresent
    port: 9198
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  pdb:
    enabled: false

# ΓöÇΓöÇ Analyzer ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
analyzer:
  enabled: true
  image:
    repository: oracle1012/applicative-load-observability
    tag: analyzer-2.1.6
    pullPolicy: IfNotPresent
  replicas: 2
  port: 8000
  dynamicBaselines:
    cacheTTL: "60"
    queryWindow: "1 HOUR"
  stressBaselines:
    tookMs: ""
    hits: ""
    shardsTotal: ""
    docsAffected: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}
  extraEnv: []
  # Request-body capture tunables. Sets env ALO_REQUEST_BODY_STORE_MAX_BYTES on the
  # analyzer container — caps bytes of request_body persisted to alo_raw + alo_dead_letter.
  # Omit storeMaxBytes (or the whole block) to use the code default of 32768.
  # Example:
  #   requestBody:
  #     storeMaxBytes: 65536
  requestBody: {}
  pdb:
    enabled: false

# ΓöÇΓöÇ Gateway ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
gateway:
  enabled: true
  # The Elasticsearch cluster the gateway proxies (the *customer's* ES being
  # monitored). REQUIRED when gateway.enabled=true.
  elasticsearch:
    url: ""
    auth:
      injectAuth: false
      type: basic
      username: ""
      password: ""
      apiKey: ""
      existingSecret: ""
    tls:
      caCert: ""
      caCertSecret: ""
      create: false
      insecureSkipVerify: false
  dnsResolver: ""
  image:
    repository: oracle1012/applicative-load-observability
    tag: gateway-2.1.6
    pullPolicy: IfNotPresent
  replicas: 2
  port: 9200
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  initResources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  errorLogLevel: warn
  workerProcesses: 2
  workerConnections: 4096
  # In-memory buffer for incoming request bodies. Bodies larger than this spool
  # to disk (client_body_temp_path). Bump only if disk I/O on huge bulks becomes
  # a bottleneck.
  clientBodyBufferSize: "64m"
  proxyReadTimeout: 60s
  proxyConnectTimeout: 10s
  pipelineTimeout: 1000
  probes:
    enabled: false
    liveness:
      initialDelaySeconds: 5
      periodSeconds: 10
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
  service:
    type: ClusterIP
    port: 9200
  nodeSelector: {}
  tolerations: []
  affinity: {}
  exporter:
    enabled: false
    image:
      repository: nginx/nginx-prometheus-exporter
      tag: "1.4.0"
      pullPolicy: IfNotPresent
    port: 9113
    stubStatusPort: 9145
    resources:
      requests:
        cpu: 50m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  podAnnotations: {}
  extraEnv: []
  pdb:
    enabled: false

# ΓöÇΓöÇ Grafana ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
grafana:
  enabled: true
  external:
    enabled: false
    url: ""
    auth:
      username: admin
      password: admin
      existingSecret: ""

  image:
    repository: grafana/grafana
    tag: "11.0.0"
    pullPolicy: IfNotPresent
  replicas: 1
  adminPassword: admin
  adminPasswordExistingSecret: ""
  prometheusUrl: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 3000
  setup:
    enabled: true
    image:
      repository: oracle1012/applicative-load-observability
      tag: grafana-setup-2.1.6
      pullPolicy: IfNotPresent
    # Create/update the ClickHouse datasource via the Grafana API.
    datasource: true
    # Import/update dashboards via the Grafana API.
    dashboards: true
  nodeSelector: {}
  tolerations: []
  affinity: {}
  podAnnotations: {}

# ΓöÇΓöÇ Ingress (Kubernetes) ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
ingress:
  enabled: false
  className: ""
  annotations: {}
  gateway:
    host: ""
    path: /
  clickhouse:
    host: ""
    path: /
  grafana:
    host: ""
    path: /
  analyzer:
    host: ""
    path: /
  logstash:
    host: ""
    path: /
  tls: []

# ΓöÇΓöÇ Route (OpenShift) ΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇΓöÇ
route:
