apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alo.fullname" . }}-analyzer
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 4 }}
spec:
  replicas: {{ .Values.analyzer.replicas }}
  selector:
    matchLabels:
      {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alo.labels" . | nindent 8 }}
        {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 8 }}
      {{- with .Values.analyzer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "alo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- include "alo.imagePullSecrets" $ | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: analyzer
          image: "{{ .Values.analyzer.image.repository }}:{{ .Values.analyzer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.analyzer.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: ELASTICSEARCH_URL
              value: {{ include "alo.elasticsearchUrl" . | quote }}
            {{- if eq (include "alo.esAuthEnabled" .) "true" }}
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . }}
                  key: username
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . }}
                  key: password
            {{- end }}
            {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
            - name: ES_CA_CERT
              value: /etc/ssl/es/ca.crt
            {{- end }}
            {{- if and .Values.elasticsearch.external.enabled .Values.elasticsearch.external.tls.insecureSkipVerify }}
            - name: ES_INSECURE
              value: "true"
            {{- end }}
            - name: BASELINE_CACHE_TTL
              value: {{ .Values.analyzer.dynamicBaselines.cacheTTL | quote }}
            - name: BASELINE_QUERY_WINDOW
              value: {{ .Values.analyzer.dynamicBaselines.queryWindow | quote }}
            {{- with .Values.analyzer.stressBaselines }}
            {{- if .tookMs }}
            - name: STRESS_BASELINE_TOOK_MS
              value: {{ .tookMs | quote }}
            {{- end }}
            {{- if .hits }}
            - name: STRESS_BASELINE_HITS
              value: {{ .hits | quote }}
            {{- end }}
            {{- if .shardsTotal }}
            - name: STRESS_BASELINE_SHARDS_TOTAL
              value: {{ .shardsTotal | quote }}
            {{- end }}
            {{- if .size }}
            - name: STRESS_BASELINE_SIZE
              value: {{ .size | quote }}
            {{- end }}
            {{- if .docsAffected }}
            - name: STRESS_BASELINE_DOCS_AFFECTED
              value: {{ .docsAffected | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.analyzer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.analyzer.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
          volumeMounts:
            - name: es-ca
              mountPath: /etc/ssl/es
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.analyzer.resources | nindent 12 }}
      {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
      volumes:
        - name: es-ca
          secret:
            secretName: {{ include "alo.esCaSecretName" . }}
      {{- end }}
      {{- include "alo.scheduling" .Values.analyzer | nindent 6 }}
