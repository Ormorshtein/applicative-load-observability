{{- if .Values.analyzer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alo.fullname" . }}-analyzer
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 4 }}
spec:
  replicas: {{ .Values.analyzer.replicas }}
  selector:
    matchLabels:
      {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alo.labels" . | nindent 8 }}
        {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 8 }}
      {{- with .Values.analyzer.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "alo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- include "alo.imagePullSecrets" $ | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: analyzer
          image: "{{ .Values.analyzer.image.repository }}:{{ .Values.analyzer.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.analyzer.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: CLICKHOUSE_URL
              value: {{ include "alo.clickhouseUrl" . | quote }}
            - name: CLICKHOUSE_DATABASE
              value: {{ .Values.clickhouse.database | quote }}
            {{- if eq (include "alo.clickhouseAuthEnabled" .) "true" }}
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.clickhouseAuthSecretName" . }}
                  key: username
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.clickhouseAuthSecretName" . }}
                  key: password
            {{- end }}
            {{- if eq (include "alo.clickhouseCaEnabled" .) "true" }}
            - name: CLICKHOUSE_CA_CERT
              value: /etc/ssl/ch/ca.crt
            {{- end }}
            - name: CLICKHOUSE_INSECURE
              value: {{ include "alo.clickhouseInsecure" . | quote }}
            - name: BASELINE_CACHE_TTL
              value: {{ .Values.analyzer.dynamicBaselines.cacheTTL | quote }}
            - name: BASELINE_QUERY_WINDOW
              value: {{ .Values.analyzer.dynamicBaselines.queryWindow | quote }}
            {{- with .Values.analyzer.stressBaselines }}
            {{- if .tookMs }}
            - name: STRESS_BASELINE_TOOK_MS
              value: {{ .tookMs | quote }}
            {{- end }}
            {{- if .hits }}
            - name: STRESS_BASELINE_HITS
              value: {{ .hits | quote }}
            {{- end }}
            {{- if .shardsTotal }}
            - name: STRESS_BASELINE_SHARDS_TOTAL
              value: {{ .shardsTotal | quote }}
            {{- end }}
            {{- if .docsAffected }}
            - name: STRESS_BASELINE_DOCS_AFFECTED
              value: {{ .docsAffected | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.analyzer.requestBody }}
            {{- if hasKey . "storeMaxBytes" }}
            - name: ALO_REQUEST_BODY_STORE_MAX_BYTES
              value: {{ .storeMaxBytes | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.analyzer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.analyzer.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          {{- if eq (include "alo.clickhouseCaEnabled" .) "true" }}
          volumeMounts:
            - name: ch-ca
              mountPath: /etc/ssl/ch
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.analyzer.resources | nindent 12 }}
      {{- if eq (include "alo.clickhouseCaEnabled" .) "true" }}
      volumes:
        - name: ch-ca
          secret:
            secretName: {{ include "alo.clickhouseCaSecretName" . }}
      {{- end }}
      {{- include "alo.scheduling" .Values.analyzer | nindent 6 }}
{{- end }}
