apiVersion: v1
kind: Service
metadata:
  name: {{ include "alo.fullname" . }}-analyzer
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.analyzer.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "analyzer") | nindent 4 }}
