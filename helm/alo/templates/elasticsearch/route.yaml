{{- if and .Values.route.enabled (not .Values.elasticsearch.external.enabled) .Values.route.elasticsearch.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "alo.fullname" . }}-elasticsearch
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "elasticsearch") | nindent 4 }}
  {{- include "alo.routeAnnotations" (dict "global" .Values.route.annotations "local" .Values.route.elasticsearch.annotations) | nindent 2 }}
spec:
  {{- if .Values.route.elasticsearch.host }}
  host: {{ .Values.route.elasticsearch.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "alo.fullname" . }}-elasticsearch
    weight: 100
  port:
    targetPort: http
  {{- include "alo.routeTls" (dict "global" .Values.route.tls "local" .Values.route.elasticsearch.tls) | nindent 2 }}
{{- end }}
