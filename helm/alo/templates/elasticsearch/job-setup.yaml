{{- $es := .Values.elasticsearch.setup -}}
{{- if and $es.enabled (or $es.ilm $es.componentTemplate $es.indexTemplates $es.summaryTemplate $es.transform) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "alo.fullname" . }}-es-setup
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "es-setup") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "alo.labels" . | nindent 8 }}
        {{- include "alo.selectorLabels" (dict "ctx" . "component" "es-setup") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "alo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- include "alo.imagePullSecrets" $ | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: "{{ $es.image.repository }}:{{ $es.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ $es.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command:
            - python
            - /app/setup.py
            - --no-data-view
            - --no-saved-searches
            - --no-dashboards
            {{- if not $es.ilm }}
            - --no-ilm
            {{- end }}
            {{- if not $es.componentTemplate }}
            - --no-component-template
            {{- end }}
            {{- if not $es.indexTemplates }}
            - --no-index-templates
            {{- end }}
            {{- if not $es.summaryTemplate }}
            - --no-summary-template
            {{- end }}
            {{- if not $es.transform }}
            - --no-transform
            {{- end }}
            - --shards={{ .Values.indexSettings.shards }}
            - --replicas={{ .Values.indexSettings.replicas }}
            - --refresh-interval={{ .Values.indexSettings.refreshInterval }}
            - --raw-retention={{ .Values.indexSettings.rawRetention }}
            - --rollover-max-age={{ .Values.indexSettings.rolloverMaxAge }}
            - --summary-retention={{ .Values.indexSettings.summaryRetention }}
          env:
            - name: ELASTICSEARCH_URL
              value: {{ include "alo.elasticsearchUrl" . | quote }}
            {{- if eq (include "alo.esAuthEnabled" .) "true" }}
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . }}
                  key: username
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . }}
                  key: password
            {{- end }}
            {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
            - name: ES_CA_CERT
              value: /etc/ssl/es/ca.crt
            {{- end }}
            {{- if and .Values.elasticsearch.external.enabled .Values.elasticsearch.external.tls.insecureSkipVerify }}
            - name: ES_INSECURE
              value: "true"
            {{- end }}
          {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
          volumeMounts:
            - name: es-ca
              mountPath: /etc/ssl/es
              readOnly: true
          {{- end }}
      {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
      volumes:
        - name: es-ca
          secret:
            secretName: {{ include "alo.esCaSecretName" . }}
      {{- end }}
      {{- include "alo.scheduling" .Values.elasticsearch | nindent 6 }}
{{- end }}
