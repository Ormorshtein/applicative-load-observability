{{/*
  Chart-managed ES auth secret.
  Created when:
    - external ES with inline auth (no existingSecret), OR
    - internal ES with security enabled (no existingSecret)
*/}}
{{- if and .Values.elasticsearch.external.enabled .Values.elasticsearch.external.auth.enabled (not .Values.elasticsearch.external.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alo.fullname" . }}-es-auth
  labels:
    {{- include "alo.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.elasticsearch.external.auth.type "basic" }}
  username: {{ .Values.elasticsearch.external.auth.username | quote }}
  password: {{ .Values.elasticsearch.external.auth.password | quote }}
  {{- else if eq .Values.elasticsearch.external.auth.type "apiKey" }}
  apiKey: {{ .Values.elasticsearch.external.auth.apiKey | quote }}
  {{- end }}
{{- else if and (not .Values.elasticsearch.external.enabled) .Values.elasticsearch.security.enabled (not .Values.elasticsearch.security.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alo.fullname" . }}-es-auth
  labels:
    {{- include "alo.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.elasticsearch.security.username | quote }}
  password: {{ .Values.elasticsearch.security.password | quote }}
{{- end }}
