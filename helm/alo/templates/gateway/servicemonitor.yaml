{{- if and .Values.gateway.exporter.enabled .Values.serviceMonitors.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "alo.fullname" . }}-gateway
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
    {{- with .Values.serviceMonitors.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitors.interval }}
{{- end }}
