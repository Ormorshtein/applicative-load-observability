apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alo.fullname" . }}-gateway
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alo.labels" . | nindent 8 }}
        {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 8 }}
      annotations:
        checksum/nginx-config: {{ include (print .Template.BasePath "/gateway/configmap.yaml") . | sha256sum }}
        {{- with .Values.gateway.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "alo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- include "alo.imagePullSecrets" $ | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: resolve-dns
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
          command: ["sh", "-c"]
          args:
            - |
              {{- if .Values.gateway.dnsResolver }}
              RESOLVER="{{ .Values.gateway.dnsResolver }}"
              {{- else }}
              RESOLVER=$(awk '/^nameserver/{print $2; exit}' /etc/resolv.conf)
              {{- end }}
              sed "s/__DNS_RESOLVER__/$RESOLVER/g" /config-template/nginx.conf > /config/nginx.conf
          resources:
            {{- toYaml .Values.gateway.initResources | nindent 12 }}
          volumeMounts:
            - name: nginx-config-template
              mountPath: /config-template
              readOnly: true
            - name: nginx-config-resolved
              mountPath: /config
      containers:
        - name: gateway
          image: "{{ .Values.gateway.image.repository }}:{{ .Values.gateway.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.gateway.image.pullPolicy }}
          command: ["/usr/local/openresty/bin/openresty", "-g", "daemon off;"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: PIPELINE_URL
              value: {{ include "alo.pipelineUrl" . | quote }}
            {{- if eq (include "alo.gatewayEsAuthEnabled" .) "true" }}
            {{- $authType := include "alo.gatewayEsAuthType" . }}
            {{- if eq $authType "basic" }}
            - name: ES_AUTH_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.gatewayEsAuthSecretName" . }}
                  key: username
            - name: ES_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.gatewayEsAuthSecretName" . }}
                  key: password
            {{- else if eq $authType "apiKey" }}
            - name: ES_AUTH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.gatewayEsAuthSecretName" . }}
                  key: apiKey
            {{- end }}
            {{- end }}
            {{- if and (eq .Values.pipelineMode "nifi") .Values.nifi.external.enabled .Values.nifi.external.auth.enabled }}
            - name: NIFI_AUTH_HEADER_VALUE
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.nifiAuthSecretName" . }}
                  key: authHeaderValue
            {{- end }}
            {{- with .Values.gateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          volumeMounts:
            - name: nginx-tmp
              mountPath: /tmp/nginx
            - name: nginx-logs
              mountPath: /usr/local/openresty/nginx/logs
            - name: nginx-config-resolved
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
              readOnly: true
            {{- if eq (include "alo.gatewayEsCaEnabled" .) "true" }}
            - name: es-ca
              mountPath: /etc/ssl/es
              readOnly: true
            {{- end }}
            {{- if and (eq .Values.pipelineMode "nifi") .Values.nifi.external.enabled .Values.nifi.external.tls.caSecret }}
            - name: nifi-ca
              mountPath: /etc/ssl/nifi
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
        {{- if or .Values.gateway.exporter.enabled (eq (include "alo.exportersEffective" .) "true") }}
        - name: nginx-exporter
          image: "{{ .Values.gateway.exporter.image.repository }}:{{ .Values.gateway.exporter.image.tag }}"
          imagePullPolicy: {{ .Values.gateway.exporter.image.pullPolicy }}
          args:
            - --nginx.scrape-uri=http://localhost:{{ .Values.gateway.exporter.stubStatusPort }}/stub_status
          ports:
            - name: metrics
              containerPort: {{ .Values.gateway.exporter.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.gateway.exporter.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: nginx-config-template
          configMap:
            name: {{ include "alo.fullname" . }}-gateway-nginx
        - name: nginx-tmp
          emptyDir: {}
        - name: nginx-logs
          emptyDir: {}
        - name: nginx-config-resolved
          emptyDir: {}
        {{- if eq (include "alo.gatewayEsCaEnabled" .) "true" }}
        - name: es-ca
          secret:
            secretName: {{ include "alo.gatewayEsCaSecretName" . }}
        {{- end }}
        {{- if and (eq .Values.pipelineMode "nifi") .Values.nifi.external.enabled .Values.nifi.external.tls.caSecret }}
        - name: nifi-ca
          secret:
            secretName: {{ .Values.nifi.external.tls.caSecret }}
        {{- end }}
      {{- include "alo.scheduling" .Values.gateway | nindent 6 }}
