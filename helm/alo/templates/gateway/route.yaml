{{- if and .Values.gateway.enabled .Values.route.enabled .Values.route.gateway.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "alo.fullname" . }}-gateway
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
  {{- include "alo.routeAnnotations" (dict "global" .Values.route.annotations "local" .Values.route.gateway.annotations) | nindent 2 }}
spec:
  {{- if .Values.route.gateway.host }}
  host: {{ .Values.route.gateway.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "alo.fullname" . }}-gateway
    weight: 100
  port:
    targetPort: http
  {{- include "alo.routeTls" (dict "global" .Values.route.tls "local" .Values.route.gateway.tls) | nindent 2 }}
{{- end }}
