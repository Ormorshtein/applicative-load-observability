{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alo.fullname" . }}-gateway
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
    - port: {{ .Values.gateway.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.gateway.exporter.enabled }}
    - port: {{ .Values.gateway.exporter.stubStatusPort }}
      targetPort: lua-metrics
      protocol: TCP
      name: lua-metrics
    - port: {{ .Values.gateway.exporter.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
{{- end }}
