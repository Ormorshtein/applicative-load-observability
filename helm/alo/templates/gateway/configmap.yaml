apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alo.fullname" . }}-gateway-nginx
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
data:
  nginx.conf: |
    worker_processes {{ .Values.gateway.workerProcesses }};
    error_log stderr warn;
    pid /tmp/nginx/nginx.pid;

    env PIPELINE_URL;
    {{- if eq (include "alo.gatewayEsAuthEnabled" .) "true" }}
    {{- $authType := include "alo.gatewayEsAuthType" . }}
    {{- if eq $authType "basic" }}
    env ES_AUTH_USERNAME;
    env ES_AUTH_PASSWORD;
    {{- else if eq $authType "apiKey" }}
    env ES_AUTH_API_KEY;
    {{- end }}
    {{- end }}
    {{- if and (eq .Values.pipelineMode "nifi") .Values.nifi.external.enabled .Values.nifi.external.auth.enabled }}
    env NIFI_AUTH_HEADER_VALUE;
    {{- end }}

    events {
        worker_connections {{ .Values.gateway.workerConnections }};
    }

    http {
        client_body_temp_path /tmp/nginx/client_body;
        proxy_temp_path       /tmp/nginx/proxy;
        fastcgi_temp_path     /tmp/nginx/fastcgi;
        uwsgi_temp_path       /tmp/nginx/uwsgi;
        scgi_temp_path        /tmp/nginx/scgi;

        lua_package_path "/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/lualib/?.lua;;";
        lua_need_request_body on;
        lua_max_pending_timers 65536;
        lua_max_running_timers 4096;
        client_body_buffer_size 2m;
        client_max_body_size 10m;
        resolver __DNS_RESOLVER__ valid=10s ipv6=off;

        # Cache env vars once per worker (modules loaded lazily in timer context)
        init_worker_by_lua_block {
            _G._alo_pipeline_url = os.getenv("PIPELINE_URL") or ""
            {{- if eq (include "alo.gatewayEsAuthEnabled" .) "true" }}
            {{- $initAuthType := include "alo.gatewayEsAuthType" . }}
            {{- if eq $initAuthType "basic" }}
            local user = os.getenv("ES_AUTH_USERNAME") or ""
            local pass = os.getenv("ES_AUTH_PASSWORD") or ""
            if user ~= "" then
                _G._alo_es_auth_header = "Basic " .. ngx.encode_base64(user .. ":" .. pass)
            else
                _G._alo_es_auth_header = ""
            end
            {{- else if eq $initAuthType "apiKey" }}
            local key = os.getenv("ES_AUTH_API_KEY") or ""
            if key ~= "" then
                _G._alo_es_auth_header = "ApiKey " .. key
            else
                _G._alo_es_auth_header = ""
            end
            {{- end }}
            {{- end }}
            {{- if and (eq .Values.pipelineMode "nifi") .Values.nifi.external.enabled .Values.nifi.external.auth.enabled }}
            _G._alo_nifi_auth = os.getenv("NIFI_AUTH_HEADER_VALUE") or ""
            {{- end }}
        }

        {{- $esUrl := include "alo.gatewayElasticsearchUrl" . }}
        {{- $esHost := $esUrl | trimPrefix "http://" | trimPrefix "https://" }}
        {{- $esIsHttps := hasPrefix "https://" $esUrl }}

        upstream elasticsearch {
            server {{ $esHost }};
            keepalive 32;
        }

        server {
            listen {{ .Values.gateway.port }};

            {{- if eq (include "alo.gatewayEsAuthEnabled" .) "true" }}
            set $es_auth_header "";

            set_by_lua_block $es_auth_header {
                return _G._alo_es_auth_header or ""
            }
            {{- end }}

            location / {
                body_filter_by_lua_block {
                    local chunk = ngx.arg[1]
                    if chunk and chunk ~= "" then
                        local chunks = ngx.ctx.resp_chunks
                        if not chunks then
                            chunks = {}
                            ngx.ctx.resp_chunks = chunks
                        end
                        chunks[#chunks + 1] = chunk
                    end
                    if ngx.arg[2] then
                        ngx.ctx.resp_body = table.concat(ngx.ctx.resp_chunks or {})
                    end
                }

                log_by_lua_block {
                    local urt = tonumber(ngx.var.upstream_response_time)
                    local ctx = {
                        method          = ngx.var.request_method,
                        path            = ngx.var.uri,
                        headers         = ngx.req.get_headers(),
                        request_body    = ngx.req.get_body_data() or "",
                        response_body   = ngx.ctx.resp_body or "",
                        response_status = ngx.status,
                        gateway_took_ms = urt and (urt * 1000) or 0,
                        request_size_bytes  = tonumber(ngx.var.content_length) or 0,
                        response_size_bytes = #(ngx.ctx.resp_body or ""),
                        client_host     = ngx.var.remote_addr,
                    }

                    local function notify_pipeline(premature, ctx)
                        if premature then return end
                        local ok, err = pcall(function()
                            local http  = require("resty.http")
                            local cjson = require("cjson")
                            local httpc = http.new()
                            httpc:set_timeout({{ .Values.gateway.pipelineTimeout }})

                            local pipeline_headers = { ["Content-Type"] = "application/json" }

                            {{- if and (eq .Values.pipelineMode "nifi") .Values.nifi.external.enabled .Values.nifi.external.auth.enabled }}
                            local nifi_auth = _G._alo_nifi_auth
                            if nifi_auth and nifi_auth ~= "" then
                                pipeline_headers["{{ .Values.nifi.external.auth.headerName }}"] = nifi_auth
                            end
                            {{- end }}

                            local pipeline_url = _G._alo_pipeline_url
                            local res, err = httpc:request_uri(pipeline_url, {
                                method  = "POST",
                                body    = cjson.encode({
                                    method              = ctx.method,
                                    path                = ctx.path,
                                    headers             = ctx.headers,
                                    request_body        = ctx.request_body,
                                    response_body       = ctx.response_body,
                                    response_status     = ctx.response_status,
                                    gateway_took_ms     = ctx.gateway_took_ms,
                                    request_size_bytes  = ctx.request_size_bytes,
                                    response_size_bytes = ctx.response_size_bytes,
                                    client_host         = ctx.client_host,
                                }),
                                headers = pipeline_headers,
                                ssl_verify = pipeline_url:sub(1, 5) == "https" and {{ not (and (eq .Values.pipelineMode "nifi") .Values.nifi.external.enabled .Values.nifi.external.tls.insecureSkipVerify) }} or false,
                            })
                            if not res then
                                ngx.log(ngx.WARN, "observability: pipeline unreachable: ", err)
                            elseif res.status >= 300 then
                                ngx.log(ngx.WARN, "observability: pipeline returned ", res.status)
                            end
                        end)
                        if not ok then
                            ngx.log(ngx.WARN, "observability: dropped (pcall): ", err)
                        end
                    end

                    local ok, err = ngx.timer.at(0, notify_pipeline, ctx)
                    if not ok then
                        ngx.log(ngx.WARN, "observability: timer failed: ", err)
                    end
                }

                proxy_pass {{ $esUrl }};
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                proxy_set_header Host $proxy_host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout {{ .Values.gateway.proxyReadTimeout }};
                proxy_connect_timeout {{ .Values.gateway.proxyConnectTimeout | default "10s" }};

                # Log upstream errors so they're visible in gateway logs
                proxy_next_upstream error timeout;
                proxy_intercept_errors on;
                error_page 502 503 504 = @upstream_error;

                {{- if eq (include "alo.gatewayEsAuthEnabled" .) "true" }}
                # Forward ES credentials from env-injected variable
                proxy_set_header Authorization $es_auth_header;
                {{- end }}

                {{- if and $esIsHttps (eq (include "alo.gatewayEsCaEnabled" .) "true") }}
                proxy_ssl_trusted_certificate /etc/ssl/es/ca.crt;
                proxy_ssl_verify on;
                proxy_ssl_verify_depth {{ .Values.gateway.elasticsearch.tls.verifyDepth | default 3 }};
                {{- end }}
            }

            location @upstream_error {
                content_by_lua_block {
                    ngx.log(ngx.ERR,
                        "upstream error: status=", ngx.status,
                        " method=", ngx.var.request_method,
                        " path=", ngx.var.uri,
                        " upstream=", ngx.var.upstream_addr or "none",
                        " upstream_status=", ngx.var.upstream_status or "none",
                        " connect_time=", ngx.var.upstream_connect_time or "-",
                        " response_time=", ngx.var.upstream_response_time or "-")
                    ngx.header["Content-Type"] = "application/json"
                    ngx.say('{"error":"upstream_error","status":' .. ngx.status ..
                        ',"upstream":"' .. (ngx.var.upstream_addr or "none") ..
                        '","detail":"check gateway logs for details"}')
                }
            }
        }
    }
