{{- if and (eq (include "alo.kibanaEffective" .) "true") .Values.kibana.setup.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "alo.fullname" . }}-kibana-setup
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "kibana-setup") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "alo.labels" . | nindent 8 }}
        {{- include "alo.selectorLabels" (dict "ctx" . "component" "kibana-setup") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "alo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- include "alo.imagePullSecrets" $ | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: "{{ .Values.kibana.setup.image.repository }}:{{ .Values.kibana.setup.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.kibana.setup.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["python", "/app/setup.py"]
          env:
            - name: KIBANA_URL
              value: {{ include "alo.kibanaUrl" . | quote }}
            - name: ELASTICSEARCH_URL
              value: {{ include "alo.elasticsearchUrl" . | quote }}
            {{- if eq (include "alo.esAuthEnabled" .) "true" }}
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . }}
                  key: username
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . }}
                  key: password
            {{- end }}
            {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
            - name: ES_CA_CERT
              value: /etc/ssl/es/ca.crt
            - name: KIBANA_CA_CERT
              value: /etc/ssl/es/ca.crt
            {{- end }}
            {{- if and .Values.elasticsearch.external.enabled .Values.elasticsearch.external.tls.insecureSkipVerify }}
            - name: ES_INSECURE
              value: "true"
            - name: KIBANA_INSECURE
              value: "true"
            {{- end }}
          {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
          volumeMounts:
            - name: es-ca
              mountPath: /etc/ssl/es
              readOnly: true
          {{- end }}
      {{- if and .Values.elasticsearch.external.enabled (eq (include "alo.esCaEnabled" .) "true") }}
      volumes:
        - name: es-ca
          secret:
            secretName: {{ include "alo.esCaSecretName" . }}
      {{- end }}
      {{- include "alo.scheduling" .Values.kibana | nindent 6 }}
{{- end }}
