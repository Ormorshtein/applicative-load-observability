{{- if and .Values.kibana.enabled (not .Values.kibana.external.enabled) }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "alo.fullname" . }}-kibana
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "kibana") | nindent 4 }}
spec:
  type: {{ .Values.kibana.service.type }}
  ports:
    - port: {{ .Values.kibana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "kibana") | nindent 4 }}
{{- end }}
