{{- if and (eq (include "alo.grafanaEffective" .) "true") (not .Values.grafana.external.enabled) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alo.fullname" . }}-grafana-datasource
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "grafana") | nindent 4 }}
data:
  elasticsearch.yml: |
    apiVersion: 1
    datasources:
      - name: Elasticsearch (ALO)
        type: elasticsearch
        uid: alo-elasticsearch
        access: proxy
        url: {{ include "alo.elasticsearchUrl" . }}
        database: "logs-alo.*-*,alo-summary"
        isDefault: true
        jsonData:
          esVersion: "8.0.0"
          timeField: "@timestamp"
          logMessageField: ""
          logLevelField: ""
          maxConcurrentShardRequests: 5
          interval: ""
        editable: true

      - name: Elasticsearch (ALO Summary)
        type: elasticsearch
        uid: alo-elasticsearch-summary
        access: proxy
        url: {{ include "alo.elasticsearchUrl" . }}
        database: "alo-summary"
        isDefault: false
        jsonData:
          esVersion: "8.0.0"
          timeField: "@timestamp"
          maxConcurrentShardRequests: 5
        editable: true
  {{- if .Values.grafana.prometheusUrl }}
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus (ALO)
        type: prometheus
        uid: alo-prometheus
        access: proxy
        url: {{ .Values.grafana.prometheusUrl }}
        isDefault: false
        jsonData:
          httpMethod: POST
          timeInterval: "15s"
        editable: true
  {{- end }}
{{- end }}
