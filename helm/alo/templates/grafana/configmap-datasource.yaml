{{- if and .Values.grafana.enabled (not .Values.grafana.external.enabled) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alo.fullname" . }}-grafana-datasource
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "grafana") | nindent 4 }}
data:
  clickhouse.yml: |
    apiVersion: 1
    datasources:
      {{- $chAuth := eq (include "alo.clickhouseAuthEnabled" .) "true" }}
      {{- $chInsecure := eq (include "alo.clickhouseInsecure" .) "true" }}
      {{- $chHost := include "alo.clickhouseNativeHost" . | trim }}
      {{- $chPort := .Values.clickhouse.service.nativePort | int }}
      {{- $chSecure := hasPrefix "https://" (include "alo.clickhouseUrl" .) }}
      - name: ClickHouse (ALO)
        type: grafana-clickhouse-datasource
        uid: alo-clickhouse
        access: proxy
        isDefault: true
        jsonData:
          host: {{ $chHost | quote }}
          port: {{ $chPort }}
          protocol: native
          secure: {{ $chSecure }}
          tlsSkipVerify: {{ $chInsecure }}
          {{- if $chAuth }}
          username: {{ .Values.clickhouse.external.auth.username | default .Values.clickhouse.auth.username | default "default" | quote }}
          {{- else }}
          username: "default"
          {{- end }}
          defaultDatabase: {{ .Values.clickhouse.database | quote }}
        {{- if $chAuth }}
        secureJsonData:
          password: {{ (.Values.clickhouse.external.auth.password | default .Values.clickhouse.auth.password) | quote }}
        {{- end }}
        editable: true
  {{- if .Values.grafana.prometheusUrl }}
  prometheus.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus (ALO)
        type: prometheus
        uid: alo-prometheus
        access: proxy
        url: {{ .Values.grafana.prometheusUrl }}
        isDefault: false
        jsonData:
          httpMethod: POST
          timeInterval: "15s"
        editable: true
  {{- end }}
{{- end }}
