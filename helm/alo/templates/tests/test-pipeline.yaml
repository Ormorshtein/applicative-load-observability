{{- if eq .Values.pipelineMode "logstash" }}
{{- if not .Values.logstash.external.enabled }}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "alo.fullname" . }}-test-logstash
  labels:
    {{- include "alo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- include "alo.imagePullSecrets" $ | nindent 4 }}
  {{- end }}
  containers:
    - name: test-logstash
      image: "{{ .Values.testImage.repository }}:{{ .Values.testImage.tag }}"
      command: ["sh", "-c"]
      args:
        - |
          echo "Testing Logstash HTTP input connectivity..."
          wget -qO- --timeout=10 http://{{ include "alo.fullname" . }}-logstash:{{ .Values.logstash.service.httpPort }}/ || exit 1
          echo "Logstash is reachable."
{{- end }}
{{- end }}
