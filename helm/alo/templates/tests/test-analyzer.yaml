apiVersion: v1
kind: Pod
metadata:
  name: {{ include "alo.fullname" . }}-test-analyzer
  labels:
    {{- include "alo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test-analyzer
      image: busybox:1.36
      command: ["sh", "-c"]
      args:
        - |
          echo "Testing analyzer connectivity..."
          wget -qO- --timeout=10 http://{{ include "alo.fullname" . }}-analyzer:{{ .Values.analyzer.port }}/docs || exit 1
          echo "Analyzer is reachable."
