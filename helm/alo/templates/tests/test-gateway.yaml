apiVersion: v1
kind: Pod
metadata:
  name: {{ include "alo.fullname" . }}-test-gateway
  labels:
    {{- include "alo.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- include "alo.imagePullSecrets" $ | nindent 4 }}
  {{- end }}
  containers:
    - name: test-gateway
      image: "{{ .Values.testImage.repository }}:{{ .Values.testImage.tag }}"
      command: ["sh", "-c"]
      args:
        - |
          echo "Testing gateway connectivity..."
          wget -qO- --timeout=10 http://{{ include "alo.fullname" . }}-gateway:{{ .Values.gateway.service.port }}/ || exit 1
          echo "Gateway is reachable."
