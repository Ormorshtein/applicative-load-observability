{{- if and .Values.ingress.enabled (eq .Values.pipelineMode "nifi") (not .Values.nifi.external.enabled) .Values.ingress.nifi.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alo.fullname" . }}-nifi
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "nifi") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.nifi.host }}
      http:
        paths:
          - path: {{ .Values.ingress.nifi.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "alo.fullname" . }}-nifi
                port:
                  name: https
{{- end }}
