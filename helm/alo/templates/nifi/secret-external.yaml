{{/*
  Chart-managed secret for external NiFi auth header.
  Created only when external NiFi auth is enabled without an existingSecret.
*/}}
{{- if and .Values.nifi.external.enabled .Values.nifi.external.auth.enabled (not .Values.nifi.external.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alo.fullname" . }}-nifi-ext-auth
  labels:
    {{- include "alo.labels" . | nindent 4 }}
type: Opaque
stringData:
  authHeaderValue: {{ .Values.nifi.external.auth.headerValue | quote }}
{{- end }}
