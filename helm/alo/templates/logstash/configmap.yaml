{{- if not .Values.logstash.external.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "alo.fullname" . }}-logstash
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "logstash") | nindent 4 }}
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    pipeline.workers: {{ .Values.logstash.pipeline.workers }}
    pipeline.batch.size: {{ .Values.logstash.pipeline.batchSize }}
    pipeline.batch.delay: {{ .Values.logstash.pipeline.batchDelay }}

    queue.type: {{ .Values.logstash.queue.type }}
    queue.max_bytes: {{ .Values.logstash.queue.maxBytes }}

    log.level: info

    xpack.monitoring.enabled: false

  pipelines.yml: |
    - pipeline.id: observability
      path.config: "/usr/share/logstash/pipeline/observability.conf"

  observability.conf: |
    input {
      http {
        port => {{ .Values.logstash.service.httpPort }}
        codec => plain { charset => "ISO-8859-1" }
      }
    }

    filter {
      # Pre-escape high bytes (0x80-0xFF) as \u00XX so downstream JSON
      # parsing never corrupts binary data (e.g. gzip-compressed bodies).
      ruby {
        code => '
          msg = event.get("message")
          if msg
            escaped = msg.force_encoding("ASCII-8BIT").gsub(/[\x80-\xff]/n) { |b| "\\u00%02x" % b.ord }
            event.set("message", escaped)
          end
        '
      }

      json {
        source => "message"
        remove_field => ["message"]
      }

      if "_jsonparsefailure" in [tags] or !([method]) or !([path]) {
        drop {}
      }

      ruby {
        code => '
          require "json"
          payload = {}
          ["method", "path", "headers", "request_body", "response_body",
           "client_host", "upstream_response_time", "content_length",
           "response_size_bytes", "response_status", "cluster_name"].each do |f|
            v = event.get(f)
            payload[f] = v unless v.nil?
          end
          event.set("[@metadata][analyzer_body]", payload.to_json)
        '
      }

      http {
        url => "http://{{ include "alo.fullname" . }}-analyzer:{{ .Values.analyzer.port }}/analyze"
        verb => "POST"
        body => "%{[@metadata][analyzer_body]}"
        target_body => "[analyzer_response]"
        keepalive => true
      }

      if [analyzer_response] {
        ruby {
          code => '
            resp = event.get("[analyzer_response]")

            if resp.is_a?(Hash) && resp.key?("_msearch_records")
              event.to_hash.keys.each { |k| event.remove(k) }
              event.set("[_msearch_records]", resp["_msearch_records"])
              event.set("[@metadata][is_msearch]", "true")

            elsif resp.is_a?(Hash)
              op = (resp["request_operation"] || "unknown").to_s

              event.to_hash.keys.each { |k| event.remove(k) }
              resp.each { |k, v| event.set(k, v) }

              if op == "unknown" || resp.key?("error")
                event.set("[@metadata][dead_letter]", "true")
              end
            end
          '
        }
      }

      if [@metadata][is_msearch] {
        split {
          field => "[_msearch_records]"
        }
        ruby {
          code => '
            record = event.get("[_msearch_records]")
            if record.is_a?(Hash)
              event.remove("[_msearch_records]")
              record.each { |k, v| event.set(k, v) }
            end
          '
        }
      }

      if "_httprequestfailure" in [tags] {
        mutate {
          add_field => { "[@metadata][dead_letter]" => "true" }
        }
      }

      mutate {
        remove_field => ["@timestamp", "@version", "host", "headers", "tags"]
      }
    }

    output {
      {{- $out := .Values.logstash.clickhouseOutput }}
      if [@metadata][dead_letter] or "_httprequestfailure" in [tags] {
        clickhouse {
          http_hosts        => ["{{ include "alo.clickhouseUrl" . }}"]
          table             => "{{ .Values.clickhouse.database }}.alo_dead_letter"
          headers           => {
            "X-ClickHouse-User"     => "${CLICKHOUSE_USER}"
            "X-ClickHouse-Key"      => "${CLICKHOUSE_PASSWORD}"
            "X-ClickHouse-Settings" => {{ $out.chSettings | quote }}
          }
          flush_size        => {{ $out.deadLetterFlushSize }}
          idle_flush_time   => {{ $out.idleFlushTime }}
          automatic_retries => {{ $out.automaticRetries }}
          pool_max          => {{ $out.poolMax }}
          save_on_failure   => false
        }
      } else {
        clickhouse {
          http_hosts        => ["{{ include "alo.clickhouseUrl" . }}"]
          table             => "{{ .Values.clickhouse.database }}.alo_raw"
          headers           => {
            "X-ClickHouse-User"     => "${CLICKHOUSE_USER}"
            "X-ClickHouse-Key"      => "${CLICKHOUSE_PASSWORD}"
            "X-ClickHouse-Settings" => {{ $out.chSettings | quote }}
          }
          flush_size        => {{ $out.flushSize }}
          idle_flush_time   => {{ $out.idleFlushTime }}
          automatic_retries => {{ $out.automaticRetries }}
          pool_max          => {{ $out.poolMax }}
          save_on_failure   => false
        }
      }
    }
{{- end }}
