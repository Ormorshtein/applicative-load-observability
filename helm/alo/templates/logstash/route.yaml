{{- if and .Values.route.enabled (eq .Values.pipelineMode "logstash") (not .Values.logstash.external.enabled) .Values.route.logstash.enabled }}
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "alo.fullname" . }}-logstash
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "logstash") | nindent 4 }}
  {{- include "alo.routeAnnotations" (dict "global" .Values.route.annotations "local" .Values.route.logstash.annotations) | nindent 2 }}
spec:
  {{- if .Values.route.logstash.host }}
  host: {{ .Values.route.logstash.host }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "alo.fullname" . }}-logstash
    weight: 100
  port:
    targetPort: http
  {{- include "alo.routeTls" (dict "global" .Values.route.tls "local" .Values.route.logstash.tls) | nindent 2 }}
{{- end }}
