{{- if and (eq .Values.pipelineMode "logstash") (not .Values.logstash.external.enabled) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alo.fullname" . }}-logstash
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "logstash") | nindent 4 }}
spec:
  replicas: {{ .Values.logstash.replicas }}
  selector:
    matchLabels:
      {{- include "alo.selectorLabels" (dict "ctx" . "component" "logstash") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "alo.labels" . | nindent 8 }}
        {{- include "alo.selectorLabels" (dict "ctx" . "component" "logstash") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print .Template.BasePath "/logstash/configmap.yaml") . | sha256sum }}
        {{- with .Values.logstash.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "alo.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- include "alo.imagePullSecrets" $ | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: logstash
          image: "{{ .Values.logstash.image.repository }}:{{ .Values.logstash.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.logstash.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if eq (include "alo.esAuthEnabled" .) "true" }}
          env:
            - name: ES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . | trim }}
                  key: username
            - name: ES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "alo.esAuthSecretName" . | trim }}
                  key: password
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.logstash.service.httpPort }}
              protocol: TCP
            - name: monitoring
              containerPort: {{ .Values.logstash.service.monitoringPort }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
              readOnly: true
            - name: config
              mountPath: /usr/share/logstash/config/pipelines.yml
              subPath: pipelines.yml
              readOnly: true
            - name: config
              mountPath: /usr/share/logstash/pipeline/observability.conf
              subPath: observability.conf
              readOnly: true
            {{- if eq (include "alo.esCaEnabled" .) "true" }}
            - name: es-ca
              mountPath: /etc/ssl/es
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: monitoring
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: monitoring
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.logstash.resources | nindent 12 }}
        {{- if .Values.logstash.exporter.enabled }}
        - name: logstash-exporter
          image: "{{ .Values.logstash.exporter.image.repository }}:{{ .Values.logstash.exporter.image.tag }}"
          imagePullPolicy: {{ .Values.logstash.exporter.image.pullPolicy }}
          env:
            - name: LOGSTASH_URL
              value: "http://localhost:{{ .Values.logstash.service.monitoringPort }}"
          ports:
            - name: metrics
              containerPort: {{ .Values.logstash.exporter.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.logstash.exporter.resources | nindent 12 }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "alo.fullname" . }}-logstash
        {{- if eq (include "alo.esCaEnabled" .) "true" }}
        - name: es-ca
          secret:
            secretName: {{ include "alo.esCaSecretName" . }}
        {{- end }}
      {{- include "alo.scheduling" .Values.logstash | nindent 6 }}
{{- end }}
