{{- if and .Values.ingress.enabled (eq .Values.pipelineMode "logstash") (not .Values.logstash.external.enabled) .Values.ingress.logstash.host }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "alo.fullname" . }}-logstash
  labels:
    {{- include "alo.labels" . | nindent 4 }}
    {{- include "alo.selectorLabels" (dict "ctx" . "component" "logstash") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.logstash.host }}
      http:
        paths:
          - path: {{ .Values.ingress.logstash.path }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "alo.fullname" . }}-logstash
                port:
                  name: http
{{- end }}
