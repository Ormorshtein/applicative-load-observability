global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # Stamps a `cluster` label on every scraped series so the Grafana Stack
  # Health dashboard ($cluster variable) can scope per cluster. The value MUST
  # match the ClickHouse `cluster_name` (CLUSTER_NAME env on the logstash
  # pipeline) so Prometheus panels and the dead-letter-queue panels line up.
  # In a central/federated setup (Thanos/Mimir/remote_write) attach `cluster`
  # there instead. ${CLUSTER_NAME} is expanded by the
  # --enable-feature=expand-external-labels flag (see docker-compose.yml).
  external_labels:
    cluster: ${CLUSTER_NAME}

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: gateway-lua
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:9145"]

  - job_name: analyzer
    static_configs:
      - targets: ["analyzer:8000"]

  - job_name: logstash
    static_configs:
      - targets: ["logstash-exporter:9198"]

  # ClickHouse exposes a built-in /metrics endpoint on port 9363 (configurable
  # via prometheus.port in clickhouse-server config). Enabled by uncommenting
  # the metrics port in the clickhouse service.
  # - job_name: clickhouse
  #   static_configs:
  #     - targets: ["clickhouse:9363"]
