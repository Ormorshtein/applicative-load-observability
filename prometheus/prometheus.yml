global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["nginx-exporter:9113"]

  - job_name: gateway-lua
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:9145"]

  - job_name: analyzer
    static_configs:
      - targets: ["analyzer:8000"]

  - job_name: logstash
    static_configs:
      - targets: ["logstash-exporter:9198"]

  - job_name: elasticsearch
    static_configs:
      - targets: ["elasticsearch-exporter:9114"]
